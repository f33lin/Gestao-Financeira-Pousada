<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pousada Vale do Café</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#1a120d;color:white}
#loginScreen{height:100vh;display:flex;align-items:center;justify-content:center}
.box{background:#2a1a12;padding:30px;border-radius:10px;width:300px;text-align:center}
#app{display:none}
.sidebar{position:fixed;width:220px;height:100vh;background:#2a1a12;padding:10px}
.main{margin-left:230px;padding:15px}
.card{background:#362419;padding:10px;margin:5px;border-radius:8px}
button{width:100%;padding:8px;background:#a47148;border:none;color:white;margin:5px 0}
input,select{width:100%;padding:8px;margin:5px 0;border-radius:6px;border:none}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
<div class="box">
<h2>Pousada Vale do Café</h2>
<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>
</div>

<!-- APP -->
<div id="app">

<div class="sidebar">
<button onclick="view('dashboard')">Dashboard</button>
<button onclick="view('financeiro')">Financeiro</button>
<button onclick="view('funcionarios')">Funcionários</button>
<button onclick="view('frigobar')">Frigobar</button>
<button onclick="view('estoque')">Estoque</button>
<button onclick="gerarPDF()">Relatório</button>
<button onclick="logout()">Sair</button>
</div>

<div class="main">

<div id="dashboard">
<h3>Dashboard</h3>
<div id="cards"></div>
</div>

<div id="financeiro" style="display:none">
<div class="grid">

<div class="card">
<h4>Despesa Fixa</h4>
<select id="fixaCategoria">
<option>Energia</option>
<option>Internet</option>
<option>Salários administrativos</option>
<option>Contabilidade</option>
<option>Impostos</option>
<option>Segurança</option>
<option>Sistemas</option>
</select>
<input id="fixaValor" placeholder="Valor">
<button onclick="addFixa()">Salvar</button>
</div>

<div class="card">
<h4>Despesa Variável</h4>
<select id="varCategoria">
<option>Lavanderia</option>
<option>Limpeza</option>
<option>Café da manhã</option>
<option>Manutenção</option>
<option>Água</option>
<option>Reposição frigobar</option>
</select>
<input id="varValor" placeholder="Valor">
<button onclick="addVar()">Salvar</button>
</div>

</div>
</div>

<div id="funcionarios" style="display:none">
<div class="card">
<input id="nomeFunc" placeholder="Nome">
<input id="cargoFunc" placeholder="Cargo">
<input id="salarioFunc" placeholder="Salário">
<button onclick="addFuncionario()">Cadastrar</button>
</div>
</div>

<div id="frigobar" style="display:none">
<div class="card">
<select id="quarto"></select>
<input id="itemFrigo" placeholder="Item consumido">
<input id="valorFrigo" placeholder="Valor">
<button onclick="addFrigo()">Adicionar</button>
</div>
<div id="listaFrigo"></div>
</div>

<div id="estoque" style="display:none">
<div class="card">
<input id="nomeProduto" placeholder="Produto">
<input id="qtdProduto" placeholder="Quantidade">
<input id="valorProduto" placeholder="Valor unitário">
<button onclick="addProduto()">Cadastrar</button>
</div>

<div class="card">
<select id="produtoSelect"></select>
<input id="qtdBaixa" placeholder="Quantidade">
<button onclick="baixar()">Baixar</button>
</div>

<div id="listaEstoque"></div>
</div>

</div>
</div>

<script>

// SUPABASE
const supabaseClient = window.supabase.createClient(
"https://kvlpqffwschikabkupkd.supabase.co",
"sb_publishable_7rWKuFdnHD7duAYaPBEIOw_cC2i3sXT"
)

// LOGIN CORRIGIDO
async function login(){

const emailInput = document.getElementById("email").value.trim()
const senhaInput = document.getElementById("senha").value.trim()

if(!emailInput || !senhaInput){
alert("Preencha email e senha")
return
}

const { data, error } = await supabaseClient.auth.signInWithPassword({
email: emailInput,
password: senhaInput
})

if(error){
alert("Erro: " + error.message)
return
}

abrirSistema()
}

// SESSÃO
window.onload = async () => {
const { data } = await supabaseClient.auth.getSession()
if(data.session){
abrirSistema()
}
}

// ABRIR
function abrirSistema(){
document.getElementById("loginScreen").style.display="none"
document.getElementById("app").style.display="block"
init()
}

// LOGOUT
function logout(){
supabaseClient.auth.signOut()
location.reload()
}

// INIT
function init(){
const quartoSelect = document.getElementById("quarto")
for(let i=1;i<=11;i++){
quartoSelect.innerHTML+=`<option>Quarto ${i}</option>`
}
render()
}

// VIEW
function view(v){
["dashboard","financeiro","funcionarios","frigobar","estoque"].forEach(x=>{
document.getElementById(x).style.display="none"
})
document.getElementById(v).style.display="block"
}

// FINANCEIRO
async function addFixa(){
await supabaseClient.from('despesas').insert([{tipo:"fixa",categoria:fixaCategoria.value,valor:Number(fixaValor.value)}])
render()
}

async function addVar(){
await supabaseClient.from('despesas').insert([{tipo:"variavel",categoria:varCategoria.value,valor:Number(varValor.value)}])
render()
}

// FUNCIONARIOS
async function addFuncionario(){
await supabaseClient.from('funcionarios').insert([{
nome:nomeFunc.value,
cargo:cargoFunc.value,
valor:Number(salarioFunc.value)
}])
render()
}

// FRIGOBAR
async function addFrigo(){
await supabaseClient.from('frigobar').insert([{
quarto:quarto.value,
item:itemFrigo.value,
valor:Number(valorFrigo.value)
}])
render()
}

// ESTOQUE
async function addProduto(){
await supabaseClient.from('estoque').insert([{
nome:nomeProduto.value,
quantidade:Number(qtdProduto.value),
valor:Number(valorProduto.value)
}])
render()
}

async function baixar(){
let {data}=await supabaseClient.from('estoque').select('*').eq('nome',produtoSelect.value).single()
let nova=data.quantidade-Number(qtdBaixa.value)

if(nova<0){alert("Sem estoque");return}

await supabaseClient.from('estoque').update({quantidade:nova}).eq('nome',produtoSelect.value)
render()
}

// DASHBOARD
async function render(){

let {data:despesas}=await supabaseClient.from('despesas').select('*')
let {data:func}=await supabaseClient.from('funcionarios').select('*')
let {data:frigo}=await supabaseClient.from('frigobar').select('*')
let {data:estoque}=await supabaseClient.from('estoque').select('*')

despesas=despesas||[]
func=func||[]
frigo=frigo||[]
estoque=estoque||[]

let receita=frigo.reduce((a,b)=>a+Number(b.valor||0),0)
let custos=despesas.reduce((a,b)=>a+Number(b.valor||0),0)+func.reduce((a,b)=>a+Number(b.valor||0),0)

let lucro=receita-custos
let margem=receita>0?((lucro/receita)*100).toFixed(1):0

cards.innerHTML=`
<div class="card">Receita: ${receita}</div>
<div class="card">Custos: ${custos}</div>
<div class="card">Lucro: ${lucro}</div>
<div class="card">Margem: ${margem}%</div>
`

produtoSelect.innerHTML=estoque.map(p=>`<option>${p.nome}</option>`).join("")

listaEstoque.innerHTML=estoque.map(p=>`
<div class="card">${p.nome} | Qtd:${p.quantidade}</div>
`).join("")

listaFrigo.innerHTML=frigo.map(f=>`
<div class="card">${f.quarto} - ${f.item} - R$${f.valor}</div>
`).join("")
}

// PDF
function gerarPDF(){
const { jsPDF } = window.jspdf;
let doc=new jsPDF();
doc.text("Relatório Contábil - Pousada Vale do Café",20,20)
doc.text(cards.innerText,20,40)
doc.save("relatorio.pdf")
}

</script>

</body>
</html>
