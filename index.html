<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pousada Vale do Café • Sistema</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#1a120d;color:white}

/* LOGIN */
#loginScreen{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}
.box{
background:#2a1a12;
padding:30px;
border-radius:10px;
width:300px;
text-align:center;
}

/* APP */
#app{display:none}
.sidebar{
position:fixed;
width:220px;
height:100vh;
background:#2a1a12;
padding:10px;
}
.main{
margin-left:230px;
padding:15px;
}

.card{
background:#362419;
padding:10px;
margin:5px;
border-radius:8px;
}

button{width:100%;margin:5px 0;padding:8px;background:#a47148;border:none;color:white}
input,select{width:100%;padding:8px;margin:5px 0;border-radius:6px;border:none}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
<div class="box">
<h2>Pousada Vale do Café</h2>
<input id="inputUser" placeholder="Usuário">
<input id="inputPass" type="password" placeholder="Senha">
<button onclick="entrarSistema()">Entrar</button>
</div>
</div>

<!-- APP -->
<div id="app">

<div class="sidebar">
<button onclick="view('dashboard')">Dashboard</button>
<button onclick="view('financeiro')">Financeiro</button>
<button onclick="view('estoque')">Estoque</button>
<button onclick="gerarPDF()">Relatório PDF</button>
</div>

<div class="main">

<!-- DASH -->
<div id="dashboard">
<h3>Dashboard</h3>
<div id="cards"></div>
</div>

<!-- FINANCEIRO -->
<div id="financeiro" style="display:none">

<div class="grid">

<div class="card">
<h4>Despesa Fixa</h4>
<input id="fixa">
<button onclick="addFixa()">Salvar</button>
</div>

<div class="card">
<h4>Despesa Variável</h4>
<input id="variavel">
<button onclick="addVariavel()">Salvar</button>
</div>

<div class="card">
<h4>Funcionário</h4>
<input id="funcionario">
<button onclick="addFuncionario()">Salvar</button>
</div>

</div>

</div>

<!-- ESTOQUE -->
<div id="estoque" style="display:none">

<div class="grid">

<div class="card">
<h4>Produto</h4>
<input id="nomeProduto">
<input id="qtdProduto">
<input id="valorProduto">
<button onclick="addProduto()">Cadastrar</button>
</div>

<div class="card">
<h4>Baixa</h4>
<select id="produtoBaixa"></select>
<input id="qtdBaixa">
<button onclick="baixar()">Baixar</button>
</div>

</div>

<div id="listaEstoque"></div>

</div>

</div>
</div>

<script>

// SUPABASE
const supabaseClient = supabase.createClient(
"https://kvlpqffwschikabkupkd.supabase.co",
"sb_publishable_7rWKuFdnHD7duAYaPBEIOw_cC2i3sXT"
)

// LOGIN
function entrarSistema(){
const u=inputUser.value.trim()
const p=inputPass.value.trim()

if(u==="pousadavlc" && p==="docafe212"){
loginScreen.style.display="none"
app.style.display="block"
render()
}else{
alert("Login inválido")
}
}

// ENTER
document.addEventListener("keydown",e=>{
if(e.key==="Enter") entrarSistema()
})

// VIEW
function view(v){
dashboard.style.display="none"
financeiro.style.display="none"
estoque.style.display="none"
document.getElementById(v).style.display="block"
}

// FINANCEIRO
async function addFixa(){
await supabaseClient.from('despesas').insert([{tipo:"fixa",valor:Number(fixa.value)}])
render()
}

async function addVariavel(){
await supabaseClient.from('despesas').insert([{tipo:"variavel",valor:Number(variavel.value)}])
render()
}

async function addFuncionario(){
await supabaseClient.from('funcionarios').insert([{valor:Number(funcionario.value)}])
render()
}

// ESTOQUE
async function addProduto(){
await supabaseClient.from('estoque').insert([{
nome:nomeProduto.value,
quantidade:Number(qtdProduto.value),
valor:Number(valorProduto.value)
}])
carregarEstoque()
}

async function baixar(){

let id=produtoBaixa.value
let qtd=Number(qtdBaixa.value)

let {data}=await supabaseClient.from('estoque').select('*').eq('id',id).single()

let nova=data.quantidade-qtd

if(nova<0){alert("Sem estoque");return}

await supabaseClient.from('estoque').update({quantidade:nova}).eq('id',id)

// lançamento
await supabaseClient.from('lancamentos').insert([{
tipo:"custo",
descricao:data.nome,
valor:data.valor*qtd
}])

carregarEstoque()
}

// CARREGAR ESTOQUE
async function carregarEstoque(){

let {data}=await supabaseClient.from('estoque').select('*')

produtoBaixa.innerHTML=data.map(p=>`
<option value="${p.id}">${p.nome} (${p.quantidade})</option>
`).join("")

listaEstoque.innerHTML=data.map(p=>`
<div class="card">
${p.nome} - Qtd:${p.quantidade} - R$${p.valor}
</div>
`).join("")
}

// DASH
async function render(){

let {data:despesas}=await supabaseClient.from('despesas').select('*')
let {data:func}=await supabaseClient.from('funcionarios').select('*')
let {data:lanc}=await supabaseClient.from('lancamentos').select('*')

despesas=despesas||[]
func=func||[]
lanc=lanc||[]

let fixas=despesas.filter(d=>d.tipo==="fixa").reduce((a,b)=>a+Number(b.valor),0)
let vars=despesas.filter(d=>d.tipo==="variavel").reduce((a,b)=>a+Number(b.valor),0)
let funcionarios=func.reduce((a,b)=>a+Number(b.valor),0)
let custos=lanc.reduce((a,b)=>a+Number(b.valor),0)

let total=fixas+vars+funcionarios+custos
let receita=0
let lucro=receita-total

cards.innerHTML=`
<div class="card">Custos: ${total}</div>
<div class="card">Lucro: ${lucro}</div>
`

carregarEstoque()
}

// PDF
function gerarPDF(){
const { jsPDF } = window.jspdf;
let doc=new jsPDF();
doc.text("Relatório Contábil",20,20)
doc.text(cards.innerText,20,40)
doc.save("relatorio.pdf")
}

</script>

</body>
</html>
