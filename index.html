<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pousada Vale do Café</title>

<style>
body{margin:0;font-family:Arial;background:#1a120d;color:white}

/* LOGIN */
#loginScreen{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#1a120d;
}

.box{
background:#2a1a12;
padding:30px;
border-radius:10px;
width:300px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:6px;
}

button{
width:100%;
padding:10px;
background:#a47148;
border:none;
color:white;
border-radius:6px;
}

/* APP */
#app{
display:none;
padding:20px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
<div class="box">

<h2>Pousada Vale do Café</h2>

<input id="inputUser" placeholder="Usuário">
<input id="inputPass" type="password" placeholder="Senha">

<button onclick="entrarSistema()">Entrar</button>

</div>
</div>

<!-- APP -->
<div id="app">

<h2>Sistema carregado com sucesso ✅</h2>

<p>Se você está vendo isso, o login funcionou.</p>

</div>

<script>

// LOGIN 100% FUNCIONAL
function entrarSistema(){

const usuario = document.getElementById("inputUser").value.trim()
const senha = document.getElementById("inputPass").value.trim()

if(usuario === "pousadavlc" && senha === "docafe212"){

document.getElementById("loginScreen").style.display = "none"
document.getElementById("app").style.display = "block"

}else{
alert("Usuário ou senha inválidos")
}

}

// ENTER FUNCIONANDO
document.addEventListener("keydown", function(e){
if(e.key === "Enter"){
entrarSistema()
}
})

</script>

</body>
</html>
