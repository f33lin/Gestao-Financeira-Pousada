<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pousada Vale do Café • Sistema</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{margin:0;font-family:'Inter';background:#1a120d;color:#f5e6d3}

/* LOGIN */
.login-screen{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),
url("https://images.unsplash.com/photo-1600585154340-be6161a56a0c") center/cover;
}

.login-box{
background:#2a1a12;
padding:40px;
border-radius:14px;
width:320px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.7);
}

.login-box h1{
font-family:'Great Vibes';
font-size:36px;
color:#d4a373;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:none;
}

button{
width:100%;
padding:12px;
background:#a47148;
border:none;
border-radius:8px;
color:white;
font-weight:bold;
cursor:pointer;
}

/* APP */
.app{display:none}

.sidebar{
width:240px;
background:#2a1a12;
height:100vh;
position:fixed;
padding:20px;
}

.sidebar button{
display:block;
margin-bottom:10px;
}

.main{
margin-left:260px;
padding:20px;
}

/* CARDS */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:10px;
}

.card{
background:#362419;
padding:15px;
border-radius:10px;
text-align:center;
}

.card strong{font-size:18px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-screen">
<div class="login-box">

<h1>Pousada Vale do Café</h1>

<input id="inputUser" placeholder="Usuário">
<input id="inputPass" type="password" placeholder="Senha">

<button onclick="entrarSistema()">Entrar</button>

</div>
</div>

<!-- APP -->
<div id="app" class="app">

<div class="sidebar">
<button onclick="mostrar('dashboard')">Dashboard</button>
<button onclick="mostrar('financeiro')">Financeiro</button>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard">

<h2>Dashboard</h2>

<div id="cards" class="grid"></div>

<canvas id="grafico"></canvas>

<h3>DRE</h3>
<div id="dre" class="card"></div>

</div>

<!-- FINANCEIRO -->
<div id="financeiro" style="display:none">

<div class="card">
<h3>Despesas Fixas</h3>
<input id="fixaValor" placeholder="Valor">
<button onclick="addFixa()">Salvar</button>
</div>

<div class="card">
<h3>Despesas Variáveis</h3>
<input id="varValor" placeholder="Valor">
<button onclick="addVar()">Salvar</button>
</div>

</div>

</div>
</div>

<script>

// SUPABASE
const supabaseClient = supabase.createClient(
"https://kvlpqffwschikabkupkd.supabase.co",
"sb_publishable_xiubH7aBWRAbhJWbMGRCYA_HF5o9oR9"
)

// LOGIN CORRIGIDO
function entrarSistema(){

const user = document.getElementById("inputUser").value.trim()
const pass = document.getElementById("inputPass").value.trim()

if(user === "pousadavlc" && pass === "docafe212"){

document.getElementById("loginScreen").style.display = "none"
document.getElementById("app").style.display = "block"

render()

}else{
alert("Usuário ou senha inválidos")
}

}

// ENTER LOGIN
document.addEventListener("keydown",function(e){
if(e.key==="Enter") entrarSistema()
})

// NAVEGAÇÃO
function mostrar(sec){
document.getElementById("dashboard").style.display="none"
document.getElementById("financeiro").style.display="none"
document.getElementById(sec).style.display="block"
}

// INSERTS
async function addFixa(){
await supabaseClient.from('despesas').insert([{tipo:"fixa",valor:fixaValor.value}])
render()
}

async function addVar(){
await supabaseClient.from('despesas').insert([{tipo:"variavel",valor:varValor.value}])
render()
}

// DASHBOARD
let chart

async function render(){

try{

let {data:despesas} = await supabaseClient.from('despesas').select('*')
let {data:investimentos} = await supabaseClient.from('investimentos').select('*')
let {data:frigo} = await supabaseClient.from('frigobar').select('*')

despesas = despesas || []
investimentos = investimentos || []
frigo = frigo || []

let fixas = despesas.filter(d=>d.tipo==="fixa")
let variaveis = despesas.filter(d=>d.tipo==="variavel")

let totalFixa = fixas.reduce((a,b)=>a+Number(b.valor||0),0)
let totalVar = variaveis.reduce((a,b)=>a+Number(b.valor||0),0)
let totalInvest = investimentos.reduce((a,b)=>a+Number(b.valor||0),0)
let receita = frigo.reduce((a,b)=>a+Number(b.valor||0),0)

let custo = totalFixa + totalVar + totalInvest
let lucro = receita - custo

let media = custo / (despesas.length || 1)
let percLucro = receita>0?((lucro/receita)*100).toFixed(1):0

// CARDS
document.getElementById("cards").innerHTML = `
<div class="card"><strong>Receita</strong><br>R$ ${receita}</div>
<div class="card"><strong>Custos</strong><br>R$ ${custo}</div>
<div class="card"><strong>Lucro</strong><br>R$ ${lucro}</div>
<div class="card"><strong>Média</strong><br>R$ ${media.toFixed(2)}</div>
<div class="card"><strong>% Lucro</strong><br>${percLucro}%</div>
`

// DRE
document.getElementById("dre").innerHTML = `
Receita: R$ ${receita}<br>
Fixas: R$ ${totalFixa}<br>
Variáveis: R$ ${totalVar}<br>
Investimentos: R$ ${totalInvest}<br>
<b>Resultado: R$ ${lucro}</b>
`

// GRÁFICO
if(chart) chart.destroy()

chart = new Chart(document.getElementById("grafico"),{
type:"bar",
data:{
labels:["Receita","Fixas","Variáveis","Investimentos","Lucro"],
datasets:[{
data:[receita,totalFixa,totalVar,totalInvest,lucro]
}]
}
})

}catch(e){
console.error(e)
alert("Erro ao carregar dados do banco")
}

}

</script>

</body>
</html>
