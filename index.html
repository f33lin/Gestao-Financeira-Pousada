<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pousada Vale do Café</title>

<style>
body{margin:0;font-family:Arial;background:#1a120d;color:#fff}

.login, .app{display:flex;align-items:center;justify-content:center;height:100vh}
.app{display:none;flex-direction:column;padding:10px}

.box{background:#2a1a12;padding:20px;border-radius:10px;width:300px;text-align:center}

input,select{width:100%;padding:8px;margin:5px 0;border-radius:6px;border:none}
button{padding:10px;margin-top:5px;background:#a47148;border:none;color:white;width:100%}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.card{background:#362419;padding:10px;border-radius:8px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="login">
<div class="box">
<h2>Pousada Vale do Café</h2>
<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>
</div>

<!-- APP -->
<div id="app" class="app">

<h2>Dashboard</h2>

<div id="dashboard" class="grid"></div>

<h3>Despesas Fixas</h3>
<input id="fixa" placeholder="Valor">
<button onclick="addFixa()">Adicionar</button>

<h3>Despesas Variáveis</h3>
<input id="var" placeholder="Valor">
<button onclick="addVar()">Adicionar</button>

<h3>Compras</h3>
<input id="compra" placeholder="Valor">
<button onclick="addCompra()">Adicionar</button>

<h3>Funcionários</h3>
<input id="func" placeholder="Salário">
<button onclick="addFunc()">Adicionar</button>

<h3>Estoque</h3>
<input id="produto" placeholder="Produto">
<input id="valorProduto" placeholder="Valor">
<button onclick="addProduto()">Cadastrar</button>

<h3>Consumo Frigobar</h3>
<select id="quarto"></select>
<select id="produtoSelect"></select>
<button onclick="consumir()">Consumir</button>

</div>

<script>

// LOGIN
function login(){
if(user.value==="pousadavlc" && pass.value==="docafe212"){
login.style.display="none"
app.style.display="flex"
init()
}
}

// BANCO LOCAL
let db={
fixas:[],
variaveis:[],
compras:[],
funcionarios:[],
estoque:[],
consumo:[]
}

// INICIAR
function init(){
for(let i=1;i<=11;i++){
quarto.innerHTML+=`<option>${i}</option>`
}
render()
}

// CADASTROS
function addFixa(){db.fixas.push(Number(fixa.value));render()}
function addVar(){db.variaveis.push(Number(var.value));render()}
function addCompra(){db.compras.push(Number(compra.value));render()}
function addFunc(){db.funcionarios.push(Number(func.value));render()}

function addProduto(){
db.estoque.push({nome:produto.value,valor:Number(valorProduto.value)})
produtoSelect.innerHTML=db.estoque.map(p=>`<option>${p.nome}</option>`).join("")
render()
}

// CONSUMO
function consumir(){
let p=db.estoque.find(x=>x.nome==produtoSelect.value)
db.consumo.push({quarto:quarto.value,valor:p.valor})
render()
}

// DASHBOARD
function render(){

let receita=db.consumo.reduce((a,b)=>a+b.valor,0)

let fixas=db.fixas.reduce((a,b)=>a+b,0)
let variaveis=db.variaveis.reduce((a,b)=>a+b,0)
let compras=db.compras.reduce((a,b)=>a+b,0)
let funcionarios=db.funcionarios.reduce((a,b)=>a+b,0)

let custo=fixas+variaveis+compras+funcionarios
let lucro=receita-custo

let media=custo/(db.fixas.length+db.variaveis.length||1)
let perc=((lucro/receita)*100||0).toFixed(1)

dashboard.innerHTML=`
<div class="card">Receita<br>${receita}</div>
<div class="card">Custos<br>${custo}</div>
<div class="card">Lucro<br>${lucro}</div>
<div class="card">Média<br>${media.toFixed(2)}</div>
<div class="card">% Lucro<br>${perc}%</div>
`

}

</script>

</body>
</html>
