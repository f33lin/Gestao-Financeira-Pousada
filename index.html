<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pousada Vale do Café</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{margin:0;font-family:Arial;background:#1a120d;color:white}
#login{height:100vh;display:flex;align-items:center;justify-content:center}
.box{background:#2a1a12;padding:30px;border-radius:10px;width:300px;text-align:center}
#app{display:none}
.sidebar{position:fixed;width:220px;height:100vh;background:#2a1a12;padding:10px}
.main{margin-left:230px;padding:15px}
.card{background:#362419;padding:10px;margin:5px;border-radius:8px}
button{width:100%;padding:8px;background:#a47148;border:none;color:white;margin:5px 0}
input,select{width:100%;padding:8px;margin:5px 0;border-radius:6px;border:none}
</style>
</head>

<body>

<div id="login">
<div class="box">
<h2>Pousada Vale do Café</h2>
<input id="email">
<input id="senha" type="password">
<button onclick="login()">Entrar</button>
</div>
</div>

<div id="app">

<div class="sidebar">
<button onclick="view('dashboard')">Dashboard</button>
<button onclick="view('financeiro')">Financeiro</button>
<button onclick="view('estoque')">Estoque</button>
<button onclick="logout()">Sair</button>
</div>

<div class="main">

<div id="dashboard">
<h3>Dashboard</h3>
<div id="cards"></div>
</div>

<div id="financeiro" style="display:none">
<input id="valor">
<button onclick="addDespesa()">Salvar despesa</button>
</div>

<div id="estoque" style="display:none">
<input id="produto">
<input id="qtd">
<button onclick="addProduto()">Salvar produto</button>
</div>

</div>
</div>

<script>

const supabase = window.supabase.createClient(
"https://oifnmngeqhrbqdhqrcq.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
)

let user = null

async function login(){

const { data, error } = await supabase.auth.signInWithPassword({
email: email.value,
password: senha.value
})

if(error){ alert(error.message); return }

user = data.user
abrir()
}

async function check(){
const { data } = await supabase.auth.getSession()
if(data.session){
user = data.session.user
abrir()
}
}
check()

function abrir(){
login.style.display="none"
app.style.display="block"
render()
}

function logout(){
supabase.auth.signOut()
location.reload()
}

function view(v){
dashboard.style.display="none"
financeiro.style.display="none"
estoque.style.display="none"
document.getElementById(v).style.display="block"
}

async function addDespesa(){
await supabase.from('despesas').insert([{
user_id:user.id,
valor:Number(valor.value)
}])
render()
}

async function addProduto(){
await supabase.from('estoque').insert([{
user_id:user.id,
nome:produto.value,
quantidade:Number(qtd.value)
}])
render()
}

async function render(){

let {data:despesas}=await supabase.from('despesas').select('*')
let total=despesas.reduce((a,b)=>a+Number(b.valor||0),0)

cards.innerHTML=`<div class="card">Total despesas: ${total}</div>`
}

</script>

</body>
</html>
