<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pousada Vale do Café • Gestão</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{margin:0;font-family:'Inter';background:#1a120d;color:#f5e6d3}

/* LOGIN */
.login{
height:100vh;display:flex;align-items:center;justify-content:center;
background:linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),
url("https://images.unsplash.com/photo-1600585154340-be6161a56a0c") center/cover;
}

.login-box{
background:#2a1a12;padding:40px;border-radius:12px;width:320px;text-align:center;
}

.login-box h1{font-family:'Great Vibes';color:#d4a373}

/* APP */
.app{display:none}
.sidebar{width:240px;background:#2a1a12;height:100vh;position:fixed;padding:20px}
.main{margin-left:260px;padding:20px}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px}
.card{
background:#362419;
padding:15px;
border-radius:10px;
text-align:center;
}

.card strong{font-size:18px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="login">
<div class="login-box">
<h1>Pousada Vale do Café</h1>
<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>
</div>

<!-- APP -->
<div id="app" class="app">

<div class="sidebar">
<button onclick="view('dashboard')">Dashboard</button>
<button onclick="view('financeiro')">Financeiro</button>
</div>

<div class="main">

<h1>Dashboard</h1>

<div id="cards" class="grid"></div>

<canvas id="grafico"></canvas>

<h2>DRE</h2>
<div id="dre" class="card"></div>

</div>
</div>

<script>

const supabaseClient = supabase.createClient(
"https://kvlpqffwschikabkupkd.supabase.co",
"sb_publishable_xiubH7aBWRAbhJWbMGRCYA_HF5o9oR9"
)

// LOGIN
function login(){
if(user.value==="pousadavlc" && pass.value==="docafe212"){
login.style.display="none"
app.style.display="block"
render()
}
}

// VIEW
function view(v){}

// DASHBOARD
let chart;

async function render(){

let {data:despesas}=await supabaseClient.from('despesas').select('*')
let {data:investimentos}=await supabaseClient.from('investimentos').select('*')
let {data:frigo}=await supabaseClient.from('frigobar').select('*')

despesas=despesas||[]
investimentos=investimentos||[]
frigo=frigo||[]

let fixas=despesas.filter(d=>d.tipo==="fixa")
let variaveis=despesas.filter(d=>d.tipo==="variavel")

let totalFixa=fixas.reduce((a,b)=>a+Number(b.valor||0),0)
let totalVar=variaveis.reduce((a,b)=>a+Number(b.valor||0),0)
let totalInvest=investimentos.reduce((a,b)=>a+Number(b.valor||0),0)
let receita=frigo.reduce((a,b)=>a+Number(b.valor||0),0)

let custoTotal=totalFixa+totalVar+totalInvest
let lucro=receita-custoTotal

let mediaDespesa=(custoTotal/(despesas.length||1)).toFixed(2)
let percLucro=receita>0?((lucro/receita)*100).toFixed(1):0
let percCusto=receita>0?((custoTotal/receita)*100).toFixed(1):0

// CARDS
cards.innerHTML=`
<div class="card"><strong>Receita</strong><br>R$ ${receita}</div>
<div class="card"><strong>Custos</strong><br>R$ ${custoTotal}</div>
<div class="card"><strong>Lucro</strong><br>R$ ${lucro}</div>
<div class="card"><strong>Média Despesas</strong><br>R$ ${mediaDespesa}</div>
<div class="card"><strong>% Lucro</strong><br>${percLucro}%</div>
<div class="card"><strong>% Custos</strong><br>${percCusto}%</div>
`

// DRE
dre.innerHTML=`
Receita Bruta: R$ ${receita}<br>
(-) Despesas Fixas: R$ ${totalFixa}<br>
(-) Despesas Variáveis: R$ ${totalVar}<br>
(-) Investimentos: R$ ${totalInvest}<br>
<b>Resultado: R$ ${lucro}</b>
`

// GRÁFICO
if(chart) chart.destroy()

chart=new Chart(grafico,{
type:"bar",
data:{
labels:["Receita","Fixas","Variáveis","Investimentos","Lucro"],
datasets:[{
data:[receita,totalFixa,totalVar,totalInvest,lucro],
backgroundColor:"#c08a5b"
}]
}
})

}

</script>

</body>
</html>
