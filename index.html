<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pousada Vale do Café • Sistema</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{margin:0;font-family:'Playfair Display',serif;background:#1a120d;color:#f5e6d3}

/* LOGIN */
.login-screen{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(rgba(20,10,5,0.85),rgba(20,10,5,0.85)),
url("https://images.unsplash.com/photo-1600585154340-be6161a56a0c") center/cover;
}

.login-box{
background:rgba(44,27,18,0.95);
padding:45px;
border-radius:16px;
width:340px;
text-align:center;
}

.login-box h1{
font-family:'Great Vibes';
font-size:38px;
color:#d4a373;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:none;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#a47148;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
}

/* APP */
.app{display:none}
.sidebar{
width:240px;
background:#2a1a12;
height:100vh;
position:fixed;
padding:20px;
}
.main{
margin-left:260px;
padding:20px;
}
.card{
background:#362419;
padding:15px;
border-radius:12px;
margin-bottom:10px;
}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-screen">
<div class="login-box">
<h1>Pousada Vale do Café</h1>
<input id="user">
<input id="pass" type="password">
<button onclick="login()">Entrar</button>
</div>
</div>

<!-- APP -->
<div id="app" class="app">

<div class="sidebar">
<button onclick="view('dashboard')">Dashboard</button>
<button onclick="view('financeiro')">Financeiro</button>
<button onclick="view('compras')">Compras</button>
<button onclick="view('funcionarios')">Funcionários</button>
<button onclick="view('quartos')">Quartos</button>
</div>

<div class="main">

<h1>Dashboard</h1>
<div id="dash" class="card"></div>
<canvas id="grafico"></canvas>
<button onclick="relatorioPDF()">Relatório PDF</button>

<!-- FINANCEIRO -->
<div id="financeiro" style="display:none">

<div class="grid">

<div class="card">
<h3>Despesas Fixas</h3>
<input id="fixaDesc" placeholder="Descrição">
<input id="fixaValor" placeholder="Valor">
<button onclick="addFixa()">Salvar</button>
</div>

<div class="card">
<h3>Despesas Variáveis</h3>
<input id="varDesc" placeholder="Descrição">
<input id="varValor" placeholder="Valor">
<button onclick="addVar()">Salvar</button>
</div>

<div class="card">
<h3>Investimentos</h3>
<input id="descInv">
<input id="valorInv">
<button onclick="addInvestimento()">Salvar</button>
</div>

</div>

</div>

<!-- COMPRAS -->
<div id="compras" style="display:none">
<div class="card">
<input id="compraDesc">
<input id="compraValor">
<button onclick="addCompra()">Salvar</button>
<button onclick="notaCompra()">Nota PDF</button>
</div>
</div>

<!-- FUNCIONARIOS -->
<div id="funcionarios" style="display:none">
<div class="card">
<input id="nomeFunc">
<input id="funcaoFunc">
<input id="valorFunc">
<button onclick="addFuncionario()">Salvar</button>
<button onclick="holerite()">Holerite PDF</button>
</div>
</div>

<!-- QUARTOS -->
<div id="quartos" style="display:none">
<div class="card">
<input id="numeroQuarto">
<input id="nomeQuarto">
<button onclick="addQuarto()">Cadastrar</button>
</div>

<div class="card">
<input id="qFrigobar">
<input id="itemFrigo">
<input id="valorFrigo">
<button onclick="addFrigo()">Adicionar</button>
</div>
</div>

</div>
</div>

<script>

const supabaseClient = supabase.createClient(
"https://kvlpqffwschikabkupkd.supabase.co",
"sb_publishable_xiubH7aBWRAbhJWbMGRCYA_HF5o9oR9"
)

// LOGIN
function login(){
const u=document.getElementById("user").value.trim()
const p=document.getElementById("pass").value.trim()

if(u==="pousadavlc" && p==="docafe212"){
loginScreen.style.display="none"
app.style.display="block"
render()
}else{
alert("Login inválido")
}
}

// VIEW
function view(v){
["financeiro","compras","funcionarios","quartos"].forEach(x=>{
document.getElementById(x).style.display="none"
})
document.getElementById(v).style.display="block"
}

// INSERTS
async function addFixa(){
await supabaseClient.from('despesas').insert([{tipo:"fixa",descricao:fixaDesc.value,valor:fixaValor.value}])
render()
}

async function addVar(){
await supabaseClient.from('despesas').insert([{tipo:"variavel",descricao:varDesc.value,valor:varValor.value}])
render()
}

async function addInvestimento(){
await supabaseClient.from('investimentos').insert([{descricao:descInv.value,valor:valorInv.value}])
render()
}

async function addCompra(){
await supabaseClient.from('compras').insert([{descricao:compraDesc.value,valor:compraValor.value}])
render()
}

async function addFuncionario(){
await supabaseClient.from('funcionarios').insert([{nome:nomeFunc.value,funcao:funcaoFunc.value,valor:valorFunc.value}])
render()
}

async function addQuarto(){
await supabaseClient.from('quartos').insert([{numero:numeroQuarto.value,nome:nomeQuarto.value}])
render()
}

async function addFrigo(){
await supabaseClient.from('frigobar').insert([{quarto:qFrigobar.value,item:itemFrigo.value,valor:valorFrigo.value}])
render()
}

// DASH
let chart;

async function render(){

let {data:despesas}=await supabaseClient.from('despesas').select('*')
let {data:investimentos}=await supabaseClient.from('investimentos').select('*')
let {data:frigo}=await supabaseClient.from('frigobar').select('*')

despesas=despesas||[]
investimentos=investimentos||[]
frigo=frigo||[]

let fixas=despesas.filter(d=>d.tipo==="fixa")
let variaveis=despesas.filter(d=>d.tipo==="variavel")

let totalFixa=fixas.reduce((a,b)=>a+Number(b.valor),0)
let totalVar=variaveis.reduce((a,b)=>a+Number(b.valor),0)
let totalInvest=investimentos.reduce((a,b)=>a+Number(b.valor),0)
let totalFrigo=frigo.reduce((a,b)=>a+Number(b.valor),0)

let receita=totalFrigo
let lucro=receita-(totalFixa+totalVar+totalInvest)

dash.innerHTML=`
Receita: R$ ${receita}<br>
Fixas: R$ ${totalFixa}<br>
Variáveis: R$ ${totalVar}<br>
Investimentos: R$ ${totalInvest}<br>
Lucro: R$ ${lucro}
`

if(chart) chart.destroy()

chart=new Chart(grafico,{
type:"bar",
data:{
labels:["Receita","Fixas","Variáveis","Investimentos","Lucro"],
datasets:[{data:[receita,totalFixa,totalVar,totalInvest,lucro],backgroundColor:"#c08a5b"}]
}
})

}

// PDF
function relatorioPDF(){
const { jsPDF } = window.jspdf;
let doc=new jsPDF();
doc.text("Relatório Contábil",20,20)
doc.text(dash.innerText,20,40)
doc.save("relatorio.pdf")
}

// NOTA COMPRA
function notaCompra(){
const { jsPDF } = window.jspdf;
let doc=new jsPDF();
doc.text("Nota de Compra",20,20)
doc.text("Produto: "+compraDesc.value,20,40)
doc.text("Valor: R$ "+compraValor.value,20,50)
doc.save("nota_compra.pdf")
}

// HOLERITE
function holerite(){
const { jsPDF } = window.jspdf;
let doc=new jsPDF();
doc.text("Holerite",20,20)
doc.text("Nome: "+nomeFunc.value,20,40)
doc.text("Valor: R$ "+valorFunc.value,20,50)
doc.save("holerite.pdf")
}

</script>

</body>
</html>
