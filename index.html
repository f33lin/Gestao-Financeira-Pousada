<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pousada Vale do Café • Sistema</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{margin:0;font-family:'Inter';background:#1a120d;color:#f5e6d3}
.login{height:100vh;display:flex;align-items:center;justify-content:center;
background:url("https://images.unsplash.com/photo-1568605114967-8130f3a36994") center/cover;}
.login-box{background:rgba(0,0,0,0.7);padding:40px;border-radius:12px;width:300px;text-align:center}
.login-box h1{font-family:'Great Vibes';color:#d4a373}
input,select{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:none}
button{padding:10px;border:none;border-radius:8px;background:#c08a5b;color:white}
.app{display:none}
.sidebar{width:220px;background:#2a1a12;height:100vh;padding:20px;position:fixed}
.main{margin-left:240px;padding:20px}
.card{background:#362419;padding:15px;border-radius:10px;margin:10px 0}
</style>
</head>

<body>

<div id="login" class="login">
<div class="login-box">
<h1>Pousada Vale do Café</h1>
<input id="user">
<input id="pass" type="password">
<button onclick="login()">Entrar</button>
</div>
</div>

<div id="app" class="app">

<div class="sidebar">
<button onclick="view('dashboard')">Dashboard</button>
<button onclick="view('financeiro')">Financeiro</button>
<button onclick="view('compras')">Compras</button>
<button onclick="view('funcionarios')">Funcionários</button>
</div>

<div class="main">

<h1>Dashboard</h1>
<div id="dash" class="card"></div>
<canvas id="grafico"></canvas>

<!-- FINANCEIRO -->
<div id="financeiro" style="display:none">

<div class="card">
<h3>Despesas Fixas</h3>
<input id="fixaDesc" placeholder="Descrição">
<input id="fixaValor" placeholder="Valor">
<button onclick="addFixa()">Salvar</button>
</div>

<div class="card">
<h3>Despesas Variáveis</h3>
<input id="varDesc" placeholder="Descrição">
<input id="varValor" placeholder="Valor">
<button onclick="addVariavel()">Salvar</button>
</div>

</div>

<!-- COMPRAS -->
<div id="compras" style="display:none">

<div class="card">
<h3>Compra de Produtos</h3>
<input id="compraDesc" placeholder="Produto">
<input id="compraValor" placeholder="Valor">
<button onclick="addCompra()">Registrar</button>
<button onclick="notaCompra()">Gerar Nota PDF</button>
</div>

</div>

<!-- FUNCIONARIOS -->
<div id="funcionarios" style="display:none">

<div class="card">
<h3>Pagamento Funcionário</h3>
<input id="nomeFunc" placeholder="Nome">
<input id="funcaoFunc" placeholder="Função">
<input id="valorFunc" placeholder="Valor">
<button onclick="addFuncionario()">Registrar</button>
<button onclick="holerite()">Gerar Holerite PDF</button>
</div>

</div>

</div>
</div>

<script>

const supabaseClient = supabase.createClient(
"https://kvlpqffwschikabkupkd.supabase.co",
"sb_publishable_xiubH7aBWRAbhJWbMGRCYA_HF5o9oR9"
)

function login(){
if(user.value==="pousadavlc" && pass.value==="docafe212"){
login.style.display="none"
app.style.display="block"
render()
}
}

function view(v){
financeiro.style.display="none"
compras.style.display="none"
funcionarios.style.display="none"
document.getElementById(v).style.display="block"
}

// DESPESAS
async function addFixa(){
await supabaseClient.from('despesas').insert([{tipo:"fixa",descricao:fixaDesc.value,valor:fixaValor.value}])
render()
}

async function addVariavel(){
await supabaseClient.from('despesas').insert([{tipo:"variavel",descricao:varDesc.value,valor:varValor.value}])
render()
}

// COMPRAS
async function addCompra(){
await supabaseClient.from('compras').insert([{descricao:compraDesc.value,valor:compraValor.value}])
render()
}

// FUNCIONARIOS
async function addFuncionario(){
await supabaseClient.from('funcionarios').insert([{
nome:nomeFunc.value,
funcao:funcaoFunc.value,
valor:valorFunc.value
}])
render()
}

// PDF NOTA COMPRA
function notaCompra(){
const { jsPDF } = window.jspdf;
let doc=new jsPDF();

doc.text("NOTA FISCAL - COMPRA",20,20)
doc.text("Produto: "+compraDesc.value,20,40)
doc.text("Valor: R$ "+compraValor.value,20,50)

doc.save("nota_compra.pdf")
}

// HOLERITE
function holerite(){
const { jsPDF } = window.jspdf;
let doc=new jsPDF();

doc.text("HOLERITE",20,20)
doc.text("Nome: "+nomeFunc.value,20,40)
doc.text("Função: "+funcaoFunc.value,20,50)
doc.text("Valor: R$ "+valorFunc.value,20,60)

doc.save("holerite.pdf")
}

// DASHBOARD
let chart;

async function render(){

let {data:despesas}=await supabaseClient.from('despesas').select('*')

let fixas=despesas.filter(d=>d.tipo==="fixa")
let variaveis=despesas.filter(d=>d.tipo==="variavel")

let totalFixas=fixas.reduce((a,b)=>a+Number(b.valor),0)
let totalVar=variaveis.reduce((a,b)=>a+Number(b.valor),0)

let receita=10000
let lucro=receita-(totalFixas+totalVar)

dash.innerHTML=`
Fixas: R$ ${totalFixas}<br>
Variáveis: R$ ${totalVar}<br>
Lucro: R$ ${lucro}
`

if(chart) chart.destroy()

chart=new Chart(grafico,{
type:"bar",
data:{
labels:["Fixas","Variáveis","Lucro"],
datasets:[{
data:[totalFixas,totalVar,lucro],
backgroundColor:"#c08a5b"
}]
}
})

}

</script>

</body>
</html>
